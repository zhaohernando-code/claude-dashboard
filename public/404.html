<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Claude 任务中台</title>
  <script>
    // 将路径转为 query string，让 index.html 解析后还原
    var seg = 1;
    var l = window.location;
    l.replace(l.protocol+"//"+l.hostname+(l.port ? ":"+l.port : "")+
      l.pathname.split("/").slice(0,1+seg).join("/")+
      "/?p=/"+l.pathname.slice(1).split("/").slice(seg).join("/").replace(/&/g,"%26")+
      (l.search ? "&q="+l.search.slice(1).replace(/&/g,"%26") : "")+
      l.hash
    );
  </script>
</head>
<body>跳转中...</body>
</html>
